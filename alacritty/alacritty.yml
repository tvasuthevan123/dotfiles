font:
  normal:
    family: Iosevka NF
    style: Regular

  bold:
    family: Iosevka NF
    style: Bold

  italic:
    family: Iosevka NF
    style: Italic

  bold_italic:
    family: Iosevka NF
    style: Bold Italic

  size: 12

env:
  term: "xterm-256color"

shell:
  program: /bin/zsh
  args:
    - -l
    - -c
    - "tmux attach || tmux"
